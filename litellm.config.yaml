model_list:
  - model_name: koresim/solar-persona
    litellm_params:
      model: upstage/solar-pro2
      api_key: os.environ/UPSTAGE_API_KEY
  - model_name: koresim/solar-analysis
    litellm_params:
      model: upstage/solar-pro2
      api_key: os.environ/UPSTAGE_API_KEY
  - model_name: koresim/solar-report
    litellm_params:
      model: upstage/solar-pro2
      api_key: os.environ/UPSTAGE_API_KEY
  - model_name: koresim/solar-repair
    litellm_params:
      model: upstage/solar-pro2
      api_key: os.environ/UPSTAGE_API_KEY

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  turn_off_message_logging: true
  redact_user_api_key_info: true
  drop_params: true
