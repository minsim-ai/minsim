    <title>minsim — 출시 전 시장 반응 시뮬레이션</title>
    <script>
      (() => {
        try {
          const stored = window.localStorage.getItem('minsim.theme')
          // OS 설정은 따르지 않는다. 라이트가 기본이고 다크는 사용자가 고를 때만 적용한다.
          const dark = stored === 'dark'
          document.documentElement.dataset.theme = dark ? 'minsim-dark' : 'minsim'
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch {
          document.documentElement.dataset.theme = 'minsim'
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
